{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Login</h2>
    <div id="loginAlert" class="alert"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="margin-top: 1rem; text-align: center;">
        Don't have an account? <a href="/register">Register here</a>.
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await fetchAPI('/login', 'POST', { email, password });
        showMessage('loginAlert', 'Login successful!', false);
        
        // Save user state
        localStorage.setItem('user_id', response.user_id);
        // Setting default role as buyer; a full app would return this from the API response
        localStorage.setItem('user_role', response.role || 'buyer');
        
        setTimeout(() => {
            window.location.href = '/feed'; // Redirect to feed
        }, 1000);
    } catch (err) {
        showMessage('loginAlert', err.message, true);
    }
});
</script>
{% endblock %}
