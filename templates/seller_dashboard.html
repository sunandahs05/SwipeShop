{% extends "base.html" %}
{% block content %}
<div class="dashboard-container" style="max-width: 800px; margin: 0 auto;">
    <h2>Seller Dashboard</h2>
    <p>Manage your products and inventory.</p>
    
    <div class="container" style="margin-top: 2rem; max-width: 100%;">
        <h3>Add New Product</h3>
        <div id="productAlert" class="alert"></div>
        
        <form id="addProductForm" style="margin-top: 1rem;">
            <div class="dashboard-grid" style="margin-top: 0; gap: 1rem;">
                <div class="form-group">
                    <label for="prodName">Product Name</label>
                    <input type="text" id="prodName" required>
                </div>
                <div class="form-group">
                    <label for="prodPrice">Price ($)</label>
                    <input type="number" step="0.01" id="prodPrice" required>
                </div>
            </div>
            
            <div class="dashboard-grid" style="margin-top: 0; gap: 1rem;">
                <div class="form-group">
                    <label for="prodStock">Stock Quantity</label>
                    <input type="number" id="prodStock" required>
                </div>
                <div class="form-group">
                    <label for="prodImage">Image URL</label>
                    <input type="url" id="prodImage" placeholder="https://..." required>
                </div>
            </div>

            <div class="form-group">
                <label for="prodDesc">Description</label>
                <textarea id="prodDesc" rows="4" required></textarea>
            </div>
            
            <button type="submit" class="btn">Add Product to Catalog</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Restrict to sellers (mock validation)
if (localStorage.getItem('user_role') !== 'seller' && localStorage.getItem('user_role') !== 'admin') {
    // Usually handled by backend middleware, but added UI check
    console.warn("User is not a seller");
}

document.getElementById('addProductForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const product = {
        name: document.getElementById('prodName').value,
        price: parseFloat(document.getElementById('prodPrice').value),
        stock: parseInt(document.getElementById('prodStock').value),
        image_url: document.getElementById('prodImage').value,
        description: document.getElementById('prodDesc').value
    };
    
    try {
        // Mock POST to /api/seller/products
        // await fetchAPI('/seller/products', 'POST', product);
        showMessage('productAlert', 'Mock DB: Product added successfully!', false);
        e.target.reset(); // clear form
    } catch (err) {
        showMessage('productAlert', err.message, true);
    }
});
</script>
{% endblock %}
