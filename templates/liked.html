{% extends "base.html" %}

{% block content %}
<div class="liked-container">
    <h2 class="liked-title">♥ Your Liked Products</h2>
    
    <div id="likedAlert" class="alert" style="margin-bottom: 1.5rem;"></div>
    
    <div id="statsBar" class="stats-bar">
        <span id="likedCount" class="stat-item">0 Products Liked</span>
    </div>

    <div id="likedGrid" class="liked-grid">
        <!-- Product cards will be rendered here -->
    </div>

    <div id="emptyState" style="display: none; text-align: center; padding: 3rem 1rem;">
        <h3>No Liked Products Yet</h3>
        <p>Start swiping on the <a href="/feed" style="color: #e74c3c; text-decoration: none; font-weight: bold;">Feed</a> to find products you love!</p>
    </div>
</div>

<style>
.liked-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem;
}

.liked-title {
    text-align: center;
    color: #e74c3c;
    font-size: 2rem;
    margin-bottom: 1.5rem;
    font-weight: 700;
}

.stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
    padding: 1rem;
    background: #f5f5f5;
    border-radius: 8px;
    flex-wrap: wrap;
}

.stat-item {
    font-size: 1rem;
    color: #555;
    font-weight: 600;
}

.liked-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.product-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    height: 100%;
}

.product-card:hover {
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    transform: translateY(-4px);
}

.product-image-container {
    width: 100%;
    height: 200px;
    background: #f9f9f9;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
}

.product-image {
    max-width: 100%;
    max-height: 100%;
    object-fit: cover;
    width: 100%;
    height: 100%;
}

.product-image.placeholder {
    opacity: 0.5;
    background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
}

.product-content {
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
}

.product-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #333;
    margin-bottom: 0.5rem;
    line-height: 1.3;
    min-height: 2.6rem;
}

.product-category {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.product-description {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 0.75rem;
    line-height: 1.4;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.product-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 0.75rem;
    border-top: 1px solid #f0f0f0;
}

.product-price {
    font-size: 1.4rem;
    font-weight: 700;
    color: #e74c3c;
}

.product-rating {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.9rem;
}

.star {
    color: #ffc107;
}

.rating-value {
    color: #666;
    font-weight: 600;
}

.product-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
}

.btn-small {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-remove {
    background: #f8f8f8;
    color: #e74c3c;
    border: 1px solid #e74c3c;
}

.btn-remove:hover {
    background: #ffe5dc;
}

.btn-cart {
    background: #27ae60;
    color: white;
    border: 1px solid #27ae60;
}

.btn-cart:hover {
    background: #229954;
}

.alert {
    padding: 1rem;
    border-radius: 8px;
    font-weight: 500;
}

.alert.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.alert.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.alert.warning {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffeaa7;
}

/* Responsive Design */
@media (max-width: 768px) {
    .liked-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
    }

    .product-name {
        font-size: 1rem;
    }

    .product-price {
        font-size: 1.2rem;
    }

    .liked-title {
        font-size: 1.5rem;
    }

    .product-actions {
        flex-direction: column;
    }
}

@media (max-width: 480px) {
    .liked-grid {
        grid-template-columns: 1fr;
    }

    .product-image-container {
        height: 250px;
    }

    .liked-container {
        padding: 1rem 0.5rem;
    }

    .stats-bar {
        gap: 1rem;
    }
}

/* Loading spinner */
.loading-spinner {
    inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #f3f3f3;
    border-top: 3px solid #e74c3c;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

{% endblock %}

{% block extra_js %}
<script>
// State
let likedProducts = [];
let userRole = localStorage.getItem('user_role') || 'buyer';

// DOM Elements
const likedGrid = document.getElementById('likedGrid');
const emptyState = document.getElementById('emptyState');
const likedAlert = document.getElementById('likedAlert');
const likedCountSpan = document.getElementById('likedCount');

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
    await loadLikedProducts();
});

/**
 * Load liked products from /api/liked endpoint
 */
async function loadLikedProducts() {
    try {
        likedGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;"><div class="loading-spinner"></div></div>';
        
        const response = await fetch('/api/liked');
        
        if (!response.ok) {
            if (response.status === 401) {
                window.location.href = '/login';
                return;
            }
            throw new Error('Failed to load liked products');
        }

        likedProducts = await response.json();

        if (likedProducts.length === 0) {
            likedGrid.innerHTML = '';
            emptyState.style.display = 'block';
            likedCountSpan.textContent = '0 Products Liked';
        } else {
            emptyState.style.display = 'none';
            renderLikedProducts();
            likedCountSpan.textContent = `${likedProducts.length} Product${likedProducts.length !== 1 ? 's' : ''} Liked`;
        }
    } catch (error) {
        showAlert('Error loading liked products: ' + error.message, 'error');
        likedGrid.innerHTML = '';
    }
}

/**
 * Render all liked products as cards
 */
function renderLikedProducts() {
    likedGrid.innerHTML = '';

    likedProducts.forEach((product) => {
        const card = createProductCard(product);
        likedGrid.appendChild(card);
    });
}

/**
 * Create a product card element
 * @param {Object} product - Product data
 * @returns {HTMLElement} Product card element
 */
function createProductCard(product) {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.dataset.productId = product.product_id;

    // Image URL - use placeholder if missing
    const imageUrl = product.image_url || 'https://via.placeholder.com/250x200?text=No+Image';

    // Rating display
    const rating = parseFloat(product.avg_rating) || 0;
    const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));

    // Category name
    const categoryName = product.category_name || 'Unknown Category';

    // Price
    const price = parseFloat(product.price).toFixed(2);

    card.innerHTML = `
        <div class="product-image-container">
            <img src="${escapeHTML(imageUrl)}" 
                 alt="${escapeHTML(product.name)}"
                 class="product-image"
                 onerror="this.src='https://via.placeholder.com/250x200?text=Image+Error'"
                 onload="this.classList.remove('placeholder')">
        </div>
        <div class="product-content">
            <div class="product-category">${escapeHTML(categoryName)}</div>
            <h3 class="product-name">${escapeHTML(product.name)}</h3>
            <p class="product-description">${escapeHTML(product.description || 'No description available')}</p>
            <div class="product-footer">
                <div class="product-price">$${price}</div>
                <div class="product-rating">
                    <span class="rating-value">${rating.toFixed(1)}</span>
                    <span class="star">${stars}</span>
                </div>
            </div>
            <div class="product-actions">
                <button class="btn-small btn-remove" onclick="handleRemoveLike(${product.product_id}, this)">
                    ✕ Remove
                </button>
                <button class="btn-small btn-cart" onclick="handleAddToCart(${product.product_id})">
                    🛒 Cart
                </button>
            </div>
        </div>
    `;

    return card;
}

/**
 * Handle removing a product from likes
 * @param {number} productId - Product ID to remove
 * @param {HTMLElement} button - Button element that was clicked
 */
async function handleRemoveLike(productId, button) {
    try {
        button.disabled = true;
        button.textContent = 'Removing...';

        const response = await fetch('/api/unlike', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ product_id: productId })
        });

        if (!response.ok) {
            throw new Error('Failed to remove from likes');
        }

        // Remove from UI
        likedProducts = likedProducts.filter(p => p.product_id !== productId);
        const cardElement = document.querySelector(`[data-product-id="${productId}"]`);
        if (cardElement) {
            cardElement.style.animation = 'fadeOut 0.3s ease-out';
            setTimeout(() => cardElement.remove(), 300);
        }

        // Update count
        likedCountSpan.textContent = `${likedProducts.length} Product${likedProducts.length !== 1 ? 's' : ''} Liked`;

        // Show empty state if no products left
        if (likedProducts.length === 0) {
            emptyState.style.display = 'block';
        }

        showAlert('Product removed from likes', 'success');
    } catch (error) {
        showAlert('Error removing product: ' + error.message, 'error');
        button.disabled = false;
        button.textContent = '✕ Remove';
    }
}

/**
 * Handle adding a product to cart
 * @param {number} productId - Product ID to add to cart
 */
async function handleAddToCart(productId) {
    try {
        const response = await fetch('/api/cart/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                product_id: productId,
                qty: 1
            })
        });

        if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || 'Failed to add to cart');
        }

        showAlert('Product added to cart successfully!', 'success');
    } catch (error) {
        showAlert('Error adding to cart: ' + error.message, 'error');
    }
}

/**
 * Show alert message
 * @param {string} message - Alert message
 * @param {string} type - Alert type ('success', 'error', 'warning')
 */
function showAlert(message, type = 'info') {
    likedAlert.textContent = message;
    likedAlert.className = `alert ${type}`;
    likedAlert.style.display = 'block';

    // Auto-hide after 5 seconds
    setTimeout(() => {
        likedAlert.style.display = 'none';
    }, 5000);
}

/**
 * Escape HTML to prevent XSS
 * @param {string} text - Text to escape
 * @returns {string} Escaped text
 */
function escapeHTML(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Add fade-out animation
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; transform: scale(0.95); }
    }
`;
document.head.appendChild(style);
</script>
{% endblock %}
