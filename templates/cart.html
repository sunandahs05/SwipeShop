{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 800px;">
    <h2>Your Cart</h2>
    <div id="cartAlert" class="alert"></div>

    <div class="table-responsive">
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cartBody">
                <!-- Cart items injected here -->
            </tbody>
        </table>
    </div>

    <div style="text-align: right; margin-top: 2rem;">
        <h3>Total: $<span id="cartTotal">0.00</span></h3>
        <button id="btnCheckout" class="btn" style="width: auto; margin-top: 1rem;">Checkout via Address 1</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let cartItems = [];

async function loadCart() {
    try {
        const response = await fetch('/api/cart');
        
        if (!response.ok) {
            if (response.status === 401) {
                window.location.href = '/login';
                return;
            }
            throw new Error('Failed to load cart');
        }

        cartItems = await response.json();
        renderCart();
    } catch (error) {
        showMessage('cartAlert', 'Error loading cart: ' + error.message, true);
    }
}

function renderCart() {
    const tbody = document.getElementById('cartBody');
    tbody.innerHTML = '';
    let total = 0;
    
    if (cartItems.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Your cart is empty.</td></tr>';
        document.getElementById('btnCheckout').disabled = true;
    } else {
        cartItems.forEach(item => {
            const itemTotal = parseFloat(item.price) * parseInt(item.quantity);
            total += itemTotal;
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>$${parseFloat(item.price).toFixed(2)}</td>
                    <td>${item.quantity}</td>
                    <td>$${parseFloat(itemTotal).toFixed(2)}</td>
                </tr>
            `;
        });
        document.getElementById('btnCheckout').disabled = false;
    }
    document.getElementById('cartTotal').textContent = parseFloat(total).toFixed(2);
}

document.getElementById('btnCheckout').addEventListener('click', async () => {
    try {
        // Assume address_id = 1 for prompt simplicity
        await fetchAPI('/checkout', 'POST', { address_id: 1 });
        showMessage('cartAlert', 'Order placed successfully!', false);
        cartItems = []; // clear cart
        renderCart();
        setTimeout(() => {
            window.location.href = '/orders';
        }, 2000);
    } catch (err) {
        showMessage('cartAlert', err.message, true);
    }
});

document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
